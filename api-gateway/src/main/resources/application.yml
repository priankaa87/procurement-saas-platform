server:
  port: 8080

spring:
  application:
    name: api-gateway
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8081/realms/procurement}
  cloud:
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials
      routes:
        - id: identity-service
          uri: ${IDENTITY_URI:http://localhost:8090}
          predicates:
            - Path=/api/identity/**,/api/auth/**
          filters:
            - StripPrefix=2
        - id: vendor-service
          uri: ${VENDOR_URI:http://localhost:8091}
          predicates:
            - Path=/api/vendors/**
          filters:
            - StripPrefix=2
        - id: master-data-service
          uri: ${MASTERDATA_URI:http://localhost:8092}
          predicates:
            - Path=/api/master-data/**
          filters:
            - StripPrefix=2
        - id: tender-service
          uri: ${TENDER_URI:http://localhost:8093}
          predicates:
            - Path=/api/tenders/**
          filters:
            - StripPrefix=2
        - id: evaluation-service
          uri: ${EVALUATION_URI:http://localhost:8094}
          predicates:
            - Path=/api/evaluations/**
          filters:
            - StripPrefix=2
        - id: notification-service
          uri: ${NOTIFICATION_URI:http://localhost:8095}
          predicates:
            - Path=/api/notifications/**,/api/templates/**
          filters:
            - StripPrefix=2
        # Control plane: manages tenants themselves, so it is not tenant-scoped.
        - id: tenant-billing-service
          uri: ${TENANT_URI:http://localhost:8096}
          predicates:
            - Path=/api/tenants/**,/api/plans/**,/api/invoices/**
          filters:
            - StripPrefix=2

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  tracing:
    sampling:
      probability: 1.0
